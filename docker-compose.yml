version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: socio-desk-db
    environment:
      POSTGRES_DB: socio_desk
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d socio_desk"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: socio-desk-minio
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio_admin minio_password;
      mc mb local/socio-desk-photos --ignore-existing;
      mc anonymous set download local/socio-desk-photos;
      exit 0;
      "
    restart: "no"

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: socio-desk-network
